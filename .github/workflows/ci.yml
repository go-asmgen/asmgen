name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # The library (shared ABI0 model + per-arch builders + ISA-agnostic emit) is
  # ordinary architecture-independent Go: it builds and is coverage-gated
  # everywhere. The generated assembly is NOT exercised here — that is the
  # asm-<arch> jobs.
  lib:
    name: lib (${{ matrix.os }} / go${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ["1.22", "1.23"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          check-latest: true

      - name: Show Go version
        run: go version

      - name: Vet
        run: go vet ./arm64/... ./riscv64/... ./loong64/... ./internal/...

      - name: Build
        run: go build ./arm64/... ./riscv64/... ./loong64/... ./internal/...

      - name: Test + 100% coverage gate
        shell: bash
        run: |
          go test -race -coverprofile=cover.out ./arm64/... ./riscv64/... ./loong64/... ./internal/...
          go tool cover -func=cover.out | tee cover.txt
          # Org-wide hard rule: the library is held to 100% statement coverage.
          # Every branch must be reachable from a test or the dead code is
          # removed — the bar is never lowered. The example packages carry no
          # statements (they are generated-asm integration checks, see asm-*).
          cov=$(go tool cover -func=cover.out | tail -n 1 | awk '{print $3}' | tr -d '%')
          echo "library coverage: ${cov}%"
          awk -v t="$cov" 'BEGIN { exit !(t+0 >= 100.0) }' || {
            echo "::error::library coverage ${cov}% < 100%"; exit 1; }

      - name: Upload coverage profile
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cover-${{ matrix.os }}-go${{ matrix.go }}
          path: cover.out
          if-no-files-found: warn

  # The whole point of go-asmgen is the emitted Plan 9 assembly. That can only
  # be validated where it runs, so this job is arm64-native: it regenerates the
  # .s, checks it matches what is committed, runs `go vet` (asmdecl cross-checks
  # every name+offset(FP) against the Go declaration), builds, and runs the
  # function for real.
  asm-arm64:
    name: asm-arm64 (${{ matrix.os }} / go${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04-arm, macos-latest]
        go: ["1.22", "1.23"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          check-latest: true

      - name: Confirm arm64
        run: go env GOARCH GOHOSTARCH

      - name: Regenerate assembly and check it is committed
        run: |
          go generate ./examples/add/... ./examples/types/... ./examples/aggregate/...
          git diff --exit-code -- examples/add examples/types examples/aggregate || {
            echo "::error::generated arm64 assembly is stale; run go generate and commit"; exit 1; }

      - name: Vet (asmdecl)
        run: go vet ./examples/add/... ./examples/types/... ./examples/aggregate/...

      - name: Build
        run: go build ./examples/add/... ./examples/types/... ./examples/aggregate/...

      - name: Test (runtime correctness on native arm64)
        run: go test ./examples/add/... ./examples/types/... ./examples/aggregate/...

  # riscv64 has no GitHub-hosted runner, so this job cross-compiles on amd64 and
  # runs the generated assembly under qemu-user (binfmt). asmdecl and cmd/asm
  # still validate offsets and mnemonics statically; qemu provides the runtime
  # proof that the emitted RISC-V instructions compute the right answers.
  asm-riscv64:
    name: asm-riscv64 (go${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.22", "1.23"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          check-latest: true

      - name: Install qemu-user-static
        run: sudo apt-get update && sudo apt-get install -y qemu-user-static

      - name: Regenerate assembly and check it is committed
        run: |
          go generate ./examples/riscv64/...
          git diff --exit-code -- examples/riscv64 || {
            echo "::error::generated riscv64 assembly is stale; run go generate and commit"; exit 1; }

      - name: Vet (asmdecl)
        run: GOOS=linux GOARCH=riscv64 go vet ./examples/riscv64/...

      - name: Build (cmd/asm validates mnemonics)
        run: GOOS=linux GOARCH=riscv64 go build ./examples/riscv64/...

      - name: Test (runtime correctness under qemu-riscv64)
        run: GOARCH=riscv64 go test -exec=qemu-riscv64-static ./examples/riscv64/...

  # loong64 (LoongArch 64-bit) follows the same recipe as riscv64: no native
  # runner, so cross-compile on amd64 and run the generated assembly under
  # qemu-user. The shared ABI0 layout is unchanged; only the move table differs
  # (MOVV for 8-byte ints, MOVF/MOVD for floats).
  asm-loong64:
    name: asm-loong64 (go${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.22", "1.23"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          check-latest: true

      - name: Install qemu-user-static
        run: sudo apt-get update && sudo apt-get install -y qemu-user-static

      - name: Regenerate assembly and check it is committed
        run: |
          go generate ./examples/loong64/...
          git diff --exit-code -- examples/loong64 || {
            echo "::error::generated loong64 assembly is stale; run go generate and commit"; exit 1; }

      - name: Vet (asmdecl)
        run: GOOS=linux GOARCH=loong64 go vet ./examples/loong64/...

      - name: Build (cmd/asm validates mnemonics)
        run: GOOS=linux GOARCH=loong64 go build ./examples/loong64/...

      - name: Test (runtime correctness under qemu-loongarch64)
        run: GOARCH=loong64 go test -exec=qemu-loongarch64-static ./examples/loong64/...
