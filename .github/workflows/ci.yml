name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Always build with the latest stable Go toolchain. Some emitted instructions
# (RISC-V Vector, LoongArch LSX) are only known to recent assemblers, so the
# whole project tracks the current Go rather than pinning an old version.
jobs:
  # The library (shared ABI0 model + per-arch builders + ISA-agnostic emit) is
  # ordinary architecture-independent Go: it builds and is coverage-gated
  # everywhere. The generated assembly is NOT exercised here — that is the
  # asm-<arch> jobs.
  lib:
    name: lib (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Show Go version
        run: go version

      - name: Vet
        run: go vet ./abi/... ./emit/... ./amd64/... ./arm64/... ./riscv64/... ./loong64/...

      - name: Build
        run: go build ./abi/... ./emit/... ./amd64/... ./arm64/... ./riscv64/... ./loong64/...

      - name: Test + 100% coverage gate
        shell: bash
        run: |
          go test -race -coverprofile=cover.out ./abi/... ./emit/... ./amd64/... ./arm64/... ./riscv64/... ./loong64/...
          go tool cover -func=cover.out | tee cover.txt
          # Org-wide hard rule: the library is held to 100% statement coverage.
          # Every branch must be reachable from a test or the dead code is
          # removed — the bar is never lowered. The example packages carry no
          # statements (they are generated-asm integration checks, see asm-*).
          cov=$(go tool cover -func=cover.out | tail -n 1 | awk '{print $3}' | tr -d '%')
          echo "library coverage: ${cov}%"
          awk -v t="$cov" 'BEGIN { exit !(t+0 >= 100.0) }' || {
            echo "::error::library coverage ${cov}% < 100%"; exit 1; }

      - name: Upload coverage profile
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cover-${{ matrix.os }}
          path: cover.out
          if-no-files-found: warn

  # amd64 is the easy target: the GitHub-hosted ubuntu runner is amd64, so the
  # generated assembly (scalar + SSE SIMD) runs natively — no qemu.
  asm-amd64:
    name: asm-amd64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Confirm amd64
        run: go env GOARCH GOHOSTARCH

      - name: Regenerate assembly and check it is committed
        run: |
          go generate ./examples/amd64/... ./examples/simd/amd64/...
          git diff --exit-code -- examples/amd64 examples/simd/amd64 || {
            echo "::error::generated amd64 assembly is stale; run go generate and commit"; exit 1; }

      - name: Vet (asmdecl)
        run: go vet ./examples/amd64/... ./examples/simd/amd64/...

      - name: Build
        run: go build ./examples/amd64/... ./examples/simd/amd64/...

      - name: Test (runtime correctness on native amd64, incl. SSE SIMD)
        run: go test ./examples/amd64/... ./examples/simd/amd64/...

  # The whole point of go-asmgen is the emitted Plan 9 assembly. That can only
  # be validated where it runs, so this job is arm64-native: it regenerates the
  # .s, checks it matches what is committed, runs `go vet` (asmdecl cross-checks
  # every name+offset(FP) against the Go declaration), builds, and runs the
  # function for real (scalars, aggregates, arrays, NEON SIMD).
  asm-arm64:
    name: asm-arm64 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04-arm, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Confirm arm64
        run: go env GOARCH GOHOSTARCH

      - name: Regenerate assembly and check it is committed
        run: |
          go generate ./examples/add/... ./examples/types/... ./examples/aggregate/... ./examples/simd/arm64/... ./examples/array/arm64/...
          git diff --exit-code -- examples/add examples/types examples/aggregate examples/simd/arm64 examples/array/arm64 || {
            echo "::error::generated arm64 assembly is stale; run go generate and commit"; exit 1; }

      - name: Vet (asmdecl)
        run: go vet ./examples/add/... ./examples/types/... ./examples/aggregate/... ./examples/simd/arm64/... ./examples/array/arm64/...

      - name: Build
        run: go build ./examples/add/... ./examples/types/... ./examples/aggregate/... ./examples/simd/arm64/... ./examples/array/arm64/...

      - name: Test (runtime correctness on native arm64, incl. NEON SIMD)
        run: go test ./examples/add/... ./examples/types/... ./examples/aggregate/... ./examples/simd/arm64/... ./examples/array/arm64/...

  # riscv64 has no GitHub-hosted runner, so this job cross-compiles on amd64 and
  # runs the generated assembly under qemu-user. asmdecl and cmd/asm validate
  # offsets and mnemonics statically (including RVV); qemu provides the runtime
  # proof. The SIMD runtime is a separate step that enables the vector CPU.
  asm-riscv64:
    name: asm-riscv64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install qemu-user-static
        run: sudo apt-get update && sudo apt-get install -y qemu-user-static

      - name: Regenerate assembly and check it is committed
        run: |
          go generate ./examples/riscv64/... ./examples/simd/riscv64/...
          git diff --exit-code -- examples/riscv64 examples/simd/riscv64 || {
            echo "::error::generated riscv64 assembly is stale; run go generate and commit"; exit 1; }

      - name: Vet (asmdecl)
        run: GOOS=linux GOARCH=riscv64 go vet ./examples/riscv64/... ./examples/simd/riscv64/...

      - name: Build (cmd/asm validates mnemonics, incl. RVV)
        run: GOOS=linux GOARCH=riscv64 go build ./examples/riscv64/... ./examples/simd/riscv64/...

      - name: Test scalar (runtime under qemu-riscv64)
        run: GOARCH=riscv64 go test -exec=qemu-riscv64-static ./examples/riscv64/...

      - name: Test RVV SIMD (runtime under qemu with vectors)
        env:
          QEMU_CPU: rv64,v=true,vlen=128
        run: GOARCH=riscv64 go test -exec=qemu-riscv64-static ./examples/simd/riscv64/...

  # loong64 (LoongArch 64-bit) follows the same recipe as riscv64.
  asm-loong64:
    name: asm-loong64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install qemu-user-static
        run: sudo apt-get update && sudo apt-get install -y qemu-user-static

      - name: Regenerate assembly and check it is committed
        run: |
          go generate ./examples/loong64/... ./examples/simd/loong64/...
          git diff --exit-code -- examples/loong64 examples/simd/loong64 || {
            echo "::error::generated loong64 assembly is stale; run go generate and commit"; exit 1; }

      - name: Vet (asmdecl)
        run: GOOS=linux GOARCH=loong64 go vet ./examples/loong64/... ./examples/simd/loong64/...

      - name: Build (cmd/asm validates mnemonics, incl. LSX)
        run: GOOS=linux GOARCH=loong64 go build ./examples/loong64/... ./examples/simd/loong64/...

      - name: Test scalar (runtime under qemu-loongarch64)
        run: GOARCH=loong64 go test -exec=qemu-loongarch64-static ./examples/loong64/...

      - name: Test LSX SIMD (runtime under qemu with vectors)
        env:
          QEMU_CPU: la464
        run: GOARCH=loong64 go test -exec=qemu-loongarch64-static ./examples/simd/loong64/...
